env:
  name: GridGuardian-v0
  dataset_path: ./data/partitioned/train.csv
  val_dataset_path: ./data/partitioned/val.csv
  test_dataset_path: ./data/partitioned/test.csv
  history_length: 24
  timestep_min: 5
  households:
  - small_apartment_01
  - family_home_01
  - ev_owner_01
  observation_keys:
  - soc_kwh
  - soc_capacity_kwh
  - pv_gen_kw
  - load_kw
  - net_kw
  - battery_power_kw
  - price_signal
  - forecast_irradiance_1h
  - forecast_irradiance_3h
  - forecast_temp_1h
  - actual_irradiance_wm2
  - voltage_v
  - current_a
  time_features: true
  neighbor_balance: true
  action_type: discrete
  discrete_actions:
  - charge_small
  - charge_large
  - idle
  - discharge_small
  - discharge_large
  - offer_sell
  - offer_hold
  continuous_action_dim: 2
  continuous_action_low:
  - -3.0
  - 0.0
  continuous_action_high:
  - 3.0
  - 10.0
  safety:
    soc_min_frac: 0.1
    soc_max_frac: 0.95
    max_charge_kw: 3.0
    max_discharge_kw: 3.0
    max_grid_draw_kw: 5.0
  reward:
    cost_savings_weight: 1.0
    stability_bonus_weight: 0.1
    battery_deg_cost_weight: 0.05
    safety_penalty: -10.0
algo:
  name: CQL
  network:
    hidden_sizes:
    - 256
    - 256
    activation: relu
  lr: 0.0003
  batch_size: 256
  gamma: 0.99
  tau: 0.005
  dt:
    model_size: small
    n_layers: 6
    n_heads: 8
    d_model: 256
    context_length: 24
    dropout: 0.1
    warmup_steps: 1000
    lr: 0.0001
    weight_decay: 0.0001
  cql:
    alpha: 1.0
    n_action_samples: 10
    target_action_gap: 5.0
  bcq:
    threshold: 0.3
    phi: 0.05
  sac:
    entropy_coef: auto
    target_entropy: auto
  ppo:
    clip_range: 0.2
    n_epochs: 10
    gae_lambda: 0.95
    ent_coef: 0.01
  dqn:
    exploration_fraction: 0.1
    exploration_final_eps: 0.02
    target_update_interval: 1000
training:
  mode: offline
  total_steps: 1000000
  eval_every: 50000
  eval_episodes: 50
  seed: 42
  device: cuda:0
  num_envs: 8
  reproducible: true
  gradient_clip: 1.0
  prefill_buffer: true
  behavior_penalty:
    enabled: true
    lambda_kl: 0.1
    max_kl: 10.0
safety:
  shield_enabled: true
  shield_mode: clip
  log_incidents: true
domain_randomization:
  enabled: true
  forecast_noise_std: 0.1
  irradiance_noise_std: 0.5
  inverter_eff_range:
  - 0.85
  - 0.95
  latency_ms:
  - 0
  - 100
  sensor_dropout_prob: 0.02
  tariff_shift_range:
  - -0.5
  - 0.5
ope:
  enabled: true
  methods:
  - IS
  - WIS
  - FQE
  - DR
  bootstrap_samples: 200
  fqe_steps: 100000
  confidence_level: 0.95
packaging:
  torchscript: true
  onnx: true
  quantize: false
  output_dir: ./edge/policy_pack
logging:
  tensorboard: true
  wandb: false
  wandb_project: grid-guardian-rl
  log_dir: ./logs
