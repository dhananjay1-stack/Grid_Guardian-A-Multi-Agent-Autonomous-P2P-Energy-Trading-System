# ──────────────────────────────────────────────────────────────────────────────
# Grid-Guardian  RL Training Config  (train_rl.yaml)
# ──────────────────────────────────────────────────────────────────────────────

env:
  name: GridGuardian-v0
  dataset_path: ./data/partitioned/train.csv       # main training split
  val_dataset_path: ./data/partitioned/val.csv
  test_dataset_path: ./data/partitioned/test.csv
  history_length: 24            # timesteps for sequence models (24×5min = 2h)
  timestep_min: 5
  households:
    - small_apartment_01
    - family_home_01
    - ev_owner_01

  observation_keys:
    - soc_kwh
    - soc_capacity_kwh
    - pv_gen_kw
    - load_kw
    - net_kw
    - battery_power_kw
    - price_signal
    - forecast_irradiance_1h
    - forecast_irradiance_3h
    - forecast_temp_1h
    - actual_irradiance_wm2
    - voltage_v
    - current_a

  time_features: true           # add sin/cos hour-of-day, day-of-week
  neighbor_balance: true        # add mean net_kw of other households

  action_type: discrete         # discrete | continuous
  discrete_actions:
    - charge_small    # +1.0 kW
    - charge_large    # +3.0 kW
    - idle            #  0.0 kW
    - discharge_small # -1.0 kW
    - discharge_large # -3.0 kW
    - offer_sell      # discharge 1.5 kW + create offer
    - offer_hold      #  0.0 kW + create offer at high price

  continuous_action_dim: 2      # [battery_power_kw, bid_price]
  continuous_action_low: [-3.0, 0.0]
  continuous_action_high: [3.0, 10.0]

  safety:
    soc_min_frac: 0.10          # 10 % of capacity
    soc_max_frac: 0.95          # 95 % of capacity
    max_charge_kw: 3.0
    max_discharge_kw: 3.0
    max_grid_draw_kw: 5.0

  reward:
    cost_savings_weight: 1.0
    stability_bonus_weight: 0.1
    battery_deg_cost_weight: 0.05
    safety_penalty: -10.0

algo:
  name: CQL                     # BC | DT | CQL | BCQ | SAC | PPO | DQN | DDPG
  network:
    hidden_sizes: [256, 256]
    activation: relu
  lr: 3.0e-4
  batch_size: 256
  gamma: 0.99
  tau: 0.005

  dt:
    model_size: small
    n_layers: 6
    n_heads: 8
    d_model: 256
    context_length: 24
    dropout: 0.1
    warmup_steps: 1000
    lr: 1.0e-4
    weight_decay: 1.0e-4

  cql:
    alpha: 1.0
    n_action_samples: 10
    target_action_gap: 5.0

  bcq:
    threshold: 0.3
    phi: 0.05

  sac:
    entropy_coef: auto
    target_entropy: auto

  ppo:
    clip_range: 0.2
    n_epochs: 10
    gae_lambda: 0.95
    ent_coef: 0.01

  dqn:
    exploration_fraction: 0.1
    exploration_final_eps: 0.02
    target_update_interval: 1000

training:
  mode: offline                 # offline | online | hybrid
  total_steps: 200000
  eval_every: 10000
  eval_episodes: 20
  seed: 42
  device: cpu                   # cpu | cuda:0
  num_envs: 4
  reproducible: true
  gradient_clip: 1.0
  prefill_buffer: true

  # behaviour-penalty for non-offline-safe algos in offline mode
  behavior_penalty:
    enabled: true
    lambda_kl: 0.1
    max_kl: 10.0

safety:
  shield_enabled: true
  shield_mode: clip             # clip | fallback | reject
  log_incidents: true

domain_randomization:
  enabled: true
  forecast_noise_std: 0.10
  irradiance_noise_std: 0.08
  inverter_eff_range: [0.85, 0.95]
  latency_ms: [0, 100]
  sensor_dropout_prob: 0.02
  tariff_shift_range: [-0.5, 0.5]

ope:
  enabled: true
  methods: [IS, WIS, FQE, DR]
  bootstrap_samples: 200
  fqe_steps: 50000
  confidence_level: 0.95

packaging:
  torchscript: true
  onnx: true
  quantize: false
  output_dir: ./edge/policy_pack

logging:
  tensorboard: true
  wandb: false
  wandb_project: grid-guardian-rl
  log_dir: ./logs
