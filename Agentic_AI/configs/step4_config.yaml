mode: iter_and_select

inputs:
  bc_checkpoint: checkpoints/BC/checkpoint_best.pt
  cql_checkpoint: checkpoints/CQL/checkpoint_best.pt
  dt_checkpoint: checkpoints/DT/checkpoint_best.pt
  dataset_path: data/test_dataset.pkl

selector:
  type: rule_based
  thresholds:
    stable_regime:
      volatility_max: 0.2
      forecast_confidence_min: 0.8
    uncertain_regime:
      volatility_max: 0.5
      forecast_confidence_min: 0.4
    high_risk_regime:
      volatility_max: 1.0
      forecast_confidence_min: 0.0

fine_tuning:
  enabled: true
  learning_rate: 1e-5
  cql_conservative_weight: 5.0
  dt_context_len: 20
  synthetic_episodes: 1000

domain_randomization:
  enabled: true
  irradiance_noise_std: 0.1
  load_spike_prob: 0.05
  sensor_dropout_prob: 0.02
  inverter_eff_range: [0.90, 0.98]

validation:
  modes: [static_bc, static_cql, static_dt, dynamic_selector]
  episodes_per_mode: 50
  cvar_alpha: 0.05

outputs:
  save_dir: outputs/step4_run

