# GitHub Actions CI — Grid-Guardian RL Pipeline
# Runs on every push and PR; executes unit tests, smoke training, and lint checks.
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run unit tests
        run: python -m pytest tests/ -v --tb=short -x
      - name: Smoke CQL training (100 steps)
        run: |
          python train_rl_agents.py \
            --config configs/train_rl.yaml \
            --algo CQL --mode offline --seed 42 \
            --total-timesteps 100 --eval-every 50 --eval-episodes 2 \
            --dry-run
      - name: Import check
        run: |
          python -c "from env.microgrid_env import MicrogridEnv; print('env OK')"
          python -c "from agents.offline_rl import CQLAgent; print('agents OK')"
          python -c "from evaluation.evaluator import evaluate_policy; print('eval OK')"
          python -c "from model_packaging.exporter import export_torchscript; print('packaging OK')"
