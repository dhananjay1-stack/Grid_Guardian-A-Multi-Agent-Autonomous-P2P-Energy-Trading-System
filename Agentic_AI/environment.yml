name: grid-guardian-rl
channels:
  - defaults
  - pytorch
  - conda-forge
dependencies:
  - python=3.10
  - numpy>=1.24
  - pandas>=2.0
  - scipy
  - scikit-learn
  - matplotlib
  - pyyaml
  - pytest
  - pip
  - pip:
    - gymnasium>=0.29
    - torch>=2.0
    - tensorboard
    - onnx
    - onnxruntime
    - openpyxl
    - pyarrow
