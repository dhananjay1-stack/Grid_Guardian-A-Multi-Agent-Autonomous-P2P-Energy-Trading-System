version: '3.8'

services:
  ai-engine:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: grid-guardian-ai
    ports:
      - "5050:5050"
    environment:
      - AI_SERVER_HOST=0.0.0.0
      - AI_SERVER_PORT=5050
      - AI_SERVER_DEBUG=false
      - LOG_LEVEL=INFO
    volumes:
      # Mount model artifacts for easy updates
      - ../../Agentic_AI/models:/app/models:ro
      - ../../Agentic_AI/edge/policy_pack:/app/policy_pack:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:5050/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # Optional: Run with the main backend
  # Uncomment if using docker-compose for full stack
  # backend:
  #   build: ..
  #   depends_on:
  #     - ai-engine
  #   environment:
  #     - AI_SERVER_URL=http://ai-engine:5050
